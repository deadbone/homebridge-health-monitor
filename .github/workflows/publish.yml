name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish-current-stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check package version is stable
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          case "$PACKAGE_VERSION" in
            *-*)
              echo "Version ${PACKAGE_VERSION} is not a stable version."
              exit 1
              ;;
          esac

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Publish stable
        run: npm publish

  publish-pr-beta:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Set beta version
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const pkg = require('./package.json');
          const [core] = pkg.version.split('-');
          const [major, minor, patch] = core.split('.').map(Number);
          if ([major, minor, patch].some((part) => !Number.isInteger(part))) {
            throw new Error(`Unsupported package version: ${pkg.version}`);
          }
          const nextPatch = pkg.version.includes('-') ? `${major}.${minor}.${patch}` : `${major}.${minor}.${patch + 1}`;
          const betaVersion = `${nextPatch}-beta.pr.${process.env.PR_NUMBER}.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_RUN_ATTEMPT}`;
          execFileSync('npm', ['version', betaVersion, '--no-git-tag-version'], { stdio: 'inherit' });
          NODE
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Publish beta
        run: npm publish --tag beta

  publish-alpha-tag:
    if: github.event_name == 'push' && contains(github.ref_name, '-alpha.')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check tag is alpha
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          case "$PACKAGE_VERSION" in
            *-alpha.*) ;;
            *)
              echo "Version ${PACKAGE_VERSION} is not an alpha prerelease."
              exit 1
              ;;
          esac

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Publish alpha
        run: npm publish --tag alpha

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --prerelease \
            --latest=false
        env:
          GH_TOKEN: ${{ github.token }}

  publish-stable-tag:
    if: github.event_name == 'push' && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check tag is stable
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          case "$PACKAGE_VERSION" in
            *-*)
              echo "Version ${PACKAGE_VERSION} is not a stable version."
              exit 1
              ;;
          esac

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Publish stable
        run: npm publish

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
